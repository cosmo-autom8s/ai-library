<script>
    console.mylog = console.log;

    window.query = function(selector, node = document) { return Array.from(node.querySelectorAll(selector)); }
    window.query1 = function(selector, node = document) {
        const res = query(selector, node);
        if (res.length > 1) {
            console.warn('query1 found more than one element for selector:', selector, 'in node:', node);
        }
        return res[0] || null;
    }
    function wait_for_element(selector, callback) {
        console.log('⚡ - wait_for_element', selector);
        if (query(selector).length > 0) {
            callback();
            return;
        }

        const observer = new MutationObserver((_, observer) => {
            if (query(selector).length > 0) {
                observer.disconnect();
                callback();
            }
        });

        if (document.body) {
            observer.observe(document.body, { childList: true });
        } else {
            // If body is not yet available, observe the entire document
            observer.observe(document, { subtree: true, childList: true });
        }
    }
    wait_for_element('.plyr__menu__container button[data-plyr="language"]', function() {
        setTimeout(() => {
            // listen for captions change event
            const cc_button = query('button.plyr__control[data-plyr="captions"]')[0];
            if (cc_button) {
                set_cc_language_listener();
                if (cc_button.hasOwnProperty('_cc_listener_added')) {
                    console.log('⚡ - cc listener already added');
                    return;
                }
                cc_button._cc_listener_added = true;
                cc_button.addEventListener('click', () => {
                    set_cc_language_listener();
                    setTimeout(() => {
                        if (cc_button.getAttribute('aria-pressed') === 'true') {
                            window.parent.postMessage(JSON.stringify({
                                event: 'captions',
                                value: cc_language_buttons.filter(btn => btn.getAttribute('aria-checked') === 'true').map(btn => {
                                    return Array.from(btn.querySelector('span').childNodes).filter(node => node.nodeType === Node.TEXT_NODE)
                                        .map(node => node.textContent.trim().toLowerCase())
                                        .join('');
                                })[0] ?? '',
                            }), '*');
                        } else {
                            window.parent.postMessage(JSON.stringify({
                                event: 'captions',
                                value: '',
                            }), '*');
                        }
                    }, 100);
                });
            }
        }, 500);
    });
    if (window.location.href.indexOf('captions=false') !== -1) {
        wait_for_element('.plyr__controls__item.plyr__control[data-plyr="captions"]', function() {
            document.querySelectorAll('.plyr__controls__item.plyr__control[data-plyr="captions"]').forEach((el) => { el.style.display = 'none'; })
            document.querySelectorAll('.plyr__captions').forEach((el) => { el.style.display = 'none'; })
            const container = document.querySelector('[id$="-home"]').parentElement;
            const panels = [...container.children];

            const homePanel = panels.find(el => el.id.endsWith('-home'));
            const captionsPanel = panels.find(el => el.id.endsWith('-captions'));

            const subPanels = panels.filter(el => el !== homePanel);
            const captionsIndex = subPanels.indexOf(captionsPanel);

            const buttons = homePanel.querySelectorAll('[role="menu"] button');
            if (captionsIndex >= 0 && buttons[captionsIndex]) {
                buttons[captionsIndex].style.display = 'none';
            }
        });

    // Fullscreen API has vendor prefixes in some browsers, this handles compatibility
    function getFullscreenElement() {
        return (
            document.fullscreenElement ||
            document.webkitFullscreenElement ||
            document.mozFullScreenElement ||
            document.msFullscreenElement
        );
    }

    window.volume_changed_via_message = false;
    window.volume_changed_on_fullscreen_change = false;
    window.video_play_started = false;
    window.video_playing_triggered = false;
    window.video_playingX_triggered = false;
    window.is_mobile = false;
    window.video_paused_in_fullscreen = false;
    // Set up event listeners for fullscreen changes
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    document.addEventListener('mozfullscreenchange', handleFullscreenChange);
    document.addEventListener('MSFullscreenChange', handleFullscreenChange);

    // Handle fullscreen state changes
    function handleFullscreenChange() {
        console.mylog('---' + window.video_paused_in_fullscreen);
        window.volume_changed_on_fullscreen_change = true;
        if (getFullscreenElement()) {
            console.mylog('---entering fullscreen');
            window.parent.postMessage(JSON.stringify({
                event: 'fullscreen-enabled',
                iframe_src: window.location.href
            }), '*');

            document.body.classList.add('x_fullscreen');
            window.plyr_videoElement.play();
            window.plyr_videoElement.muted = false;

        } else {
            console.mylog('---exiting fullscreen');
            window.parent.postMessage(JSON.stringify({
                event: 'fullscreen-disabled',
                iframe_src: window.location.href
            }), '*');

            document.body.classList.remove('x_fullscreen');
            window.plyr_videoElement.muted = window.video_is_muted_flag;

            if (!window.video_paused_in_fullscreen) {
                setTimeout(() => {
                    window.plyr_videoElement.play();
                }, 200);
            }
        }
        setTimeout(() => {
            window.volume_changed_on_fullscreen_change = false;
        }, 100);

    }
    window.onbeforeunload = function() {
        window.parent = {
            postMessage: () => { console.log('#video_stream - postMessage prevented'); }
        }
        if (window.hls) {
            hls.destroy();
            hls = null;
            console.log('#video_stream - HLS instance destroyed');
        }
    }

    window.cc_language_buttons = [];
    function set_cc_language_listener(){
        window.cc_language_buttons = query('.plyr__controls__item.plyr__menu button[data-plyr="language"]');
        window.cc_language_buttons.forEach(btn => {
            if (btn.hasOwnProperty('_cc_listener_added')) {
                return;
            }
            btn._cc_listener_added = true;
            btn.addEventListener('click', () => {
                setTimeout(() => {
                    const cc_language_button_text = Array.from(btn.querySelector('span').childNodes).filter(node => node.nodeType === Node.TEXT_NODE)
                        .map(node => node.textContent.trim())
                        .join('').toLowerCase();
                    if (cc_language_button_text === 'disabled') {
                        window.parent.postMessage(JSON.stringify({
                            event: 'captions',
                            value: '',
                        }), '*');
                    } else {
                        window.parent.postMessage(JSON.stringify({
                            event: 'captions',
                            value: cc_language_button_text,
                        }), '*');
                    }

                    set_cc_language_listener();
                }, 100);
            });
        });
    }

    let ready_event_sent = false;
    window.addEventListener('message', function (event) {
        if (event.data.type === 'embed_height') {
            ready_event_sent = true;
            const offset = window.innerHeight - event.data.height - 1;
            // create css style
            const style = document.createElement('style');
            const styles_arr = [];
            styles_arr.push('body:not(.x_fullscreen) div.plyr__controls { bottom: ' + offset + 'px; }');
            styles_arr.push('body:not(.x-fullscreen) div.plyr--video > button[data-plyr="play"] { margin-top: calc(-' + offset + 'px / 2); }');
            styles_arr.push('body:not(.x-fullscreen) div.plyr__captions { bottom: ' + (20 + offset) + 'px; }');
            styles_arr.push('.force-opacity-1 { opacity: 1 !important; }');
            styles_arr.push('.force-opacity-0 { opacity: 0 !important; }');
            style.innerText = styles_arr.join("\n");
            document.head.appendChild(style);
            window.plyr_videoElement = query('video')[0];
            const plyr_poster = query('div.plyr__poster')[0];
            const plyr_controls = query('div.plyr__controls')[0];
            plyr_poster.classList.add('force-opacity-1');
            plyr_controls.classList.add('force-opacity-0');
            
            // Add "Visit Website" button
            const visit_website_btn = document.createElement('div');
            visit_website_btn.innerText = 'Visit website';
            visit_website_btn.className = 'visit_website_btn';
            query1('div.plyr').appendChild(visit_website_btn);
            visit_website_btn.addEventListener('click', function() {
                plyr_videoElement.pause();
                window.parent.postMessage(JSON.stringify({
                    event: 'visit-website',
                    iframe_src: window.location.href
                }), '*');
            });


            // plyr_videoElement.addEventListener('stalled', function(){
            //     window.parent.postMessage(JSON.stringify({
            //         event: 'stalled',
            //         type: 'video_stalled',
            //         iframe_src: window.location.href
            //     }), '*');
            // });
            plyr_videoElement.addEventListener('error', function(){
                if (getFullscreenElement()){
                    window.plyr_fullscreen_button.click();
                }
                window.parent.postMessage(JSON.stringify({
                    event: 'error',
                    type: 'video_error',
                    iframe_src: window.location.href
                }), '*');
            });
            if (window.hls) {
                const hlsErrorEvents = ['error', 'hlsError', 'fragmentLoadError', 'mediaError', 'manifestLoadError'];
                hlsErrorEvents.forEach(eventName => {
                    hls.on(eventName, function (event, data) {
                        if (getFullscreenElement()) {
                            window.plyr_fullscreen_button.click();
                        }

                        window.parent.postMessage(JSON.stringify({
                            event: 'hls_error',
                            type: data.type,
                            iframe_src: window.location.href
                        }), '*');
                    });
                });
            }
            // player.on('exitfullscreen', () => {
            //     // Resume playback when exiting fullscreen
            //     player.play();
            // });
            plyr_videoElement.addEventListener('pause', function(){
                if (getFullscreenElement()) {
                    window.video_paused_in_fullscreen = true;
                }
            });
            plyr_videoElement.addEventListener('play', function(){
                window.video_paused_in_fullscreen = false;
            });
            plyr_videoElement.addEventListener('timeupdate', function() {
                plyr_poster.classList.remove('force-opacity-1');
                plyr_controls.classList.remove('force-opacity-0');
                if (!window.video_playing_triggered && plyr_videoElement.currentTime > 0) {
                    window.video_playing_triggered = true;
                    window.parent.postMessage(JSON.stringify({
                        event: 'playing',
                        iframe_src: window.location.href
                    }), '*');
                }
                if (!window.video_playingX_triggered && plyr_videoElement.currentTime >= 7) {
                    window.video_playingX_triggered = true;
                    window.parent.postMessage(JSON.stringify({
                        event: 'playingX',
                        iframe_src: window.location.href
                    }), '*');
                }
                if (!window.video_play_started && !plyr_videoElement.paused && plyr_videoElement.currentTime >= 3) {
                    window.video_play_started = true;
                    window.parent.postMessage(JSON.stringify({
                        event: 'play_started',
                        iframe_src: window.location.href
                    }), '*');
                }

            });
            // mute video by default
            window.video_is_muted_flag = true;
            plyr_videoElement.muted = true;
            plyr_videoElement.addEventListener('volumechange', function () {
                if (!window.volume_changed_on_fullscreen_change) {
                    window.video_is_muted_flag = plyr_videoElement.muted;
                }
                // if (!window.volume_changed_via_message) {
                //     const volume_status = plyr_videoElement.muted ? 'muted' : 'unmuted';
                //     window.parent.postMessage(JSON.stringify({
                //         event: 'volumechange',
                //         volume_status: volume_status,
                //         iframe_src: window.location.href
                //     }), '*');
                // }
            });

            window.plyr_fullscreen_button = query('button.plyr__control[data-plyr="fullscreen"]')[0];
            if (event.data.hasOwnProperty('is_mobile') && event.data.is_mobile) {
                window.is_mobile = true;
                document.body.classList.add('is_mobile');
            }
            const plyr_video_wrapper = query('div.plyr__video-wrapper')[0];
            plyr_video_wrapper.addEventListener('click', function () {
                if (window.plyr_fullscreen_button && (!getFullscreenElement() || window.is_mobile)) {
                    window.volume_changed_on_fullscreen_change = true;
                    plyr_videoElement.muted = false;
                    window.plyr_fullscreen_button.click();
                    setTimeout(() => {
                        window.volume_changed_on_fullscreen_change = false;
                    }, 100);
                }
            });
            // }

            if (event.data.hasOwnProperty('captions')) {
                if (event.data.captions === '') {
                    const cc_button = query('button.plyr__control[data-plyr="captions"]')[0];
                    if (cc_button && cc_button.getAttribute('aria-pressed') === 'true') {
                        cc_button.click();
                        return;
                    }
                }
                const caption_buttons = query('.plyr__controls__item.plyr__menu button[data-plyr="language"]');
                for (let button of caption_buttons) {
                    if (Array.from(button.querySelector('span').childNodes).filter(node => node.nodeType === Node.TEXT_NODE)
                        .map(node => node.textContent.trim())
                        .join('').toLowerCase() === event.data.captions) {
                        console.log('#video_stream - captions: ' + event.data.captions);
                        button.click();
                        break;
                    }
                }
                setTimeout(() => {
                    const settings_popup_menu = query('.plyr__controls__item.plyr__menu .plyr__menu__container > div')[0];
                    settings_popup_menu.style.removeProperty('width');
                    settings_popup_menu.style.removeProperty('height');
                }, 500);
            }

            // --- Picture-in-Picture listeners ---
            document.addEventListener('enterpictureinpicture', () => {
                plyr_videoElement.muted = false;
                window.parent.postMessage(JSON.stringify({
                    event: 'pip-enabled',
                    iframe_src: window.location.href
                }), '*');
            }, true);

            document.addEventListener('leavepictureinpicture', () => {
                plyr_videoElement.muted = true;
                window.parent.postMessage(JSON.stringify({
                    event: 'pip-disabled',
                    iframe_src: window.location.href
                }), '*');
            }, true);

            document.addEventListener('keydown', (evt) => {
                if (evt.key === ' ' || evt.key === 'Spacebar') {
                    // Prevent spa ce from scrolling the page
                    evt.preventDefault();
                    if (plyr_videoElement.paused) {
                        plyr_videoElement.play();
                    } else {
                        plyr_videoElement.pause();
                    }
                }
            });
        }
        // else if (event.data.type === 'volumechange') {
        //     window.volume_changed_via_message = true;
        //     if (event.data.volume_status === 'muted') {
        //         window.video_is_muted_flag = true;
        //         window.plyr_videoElement.muted = true;
        //     } else {
        //         window.video_is_muted_flag = false;
        //         if (!is_mobile) {
        //             window.plyr_videoElement.muted = false;
        //         }
        //     }
        //     setTimeout(() => {
        //         window.volume_changed_via_message = false;
        //     }, 100);
        // }
    });
    setTimeout(function() {
        if (!ready_event_sent) {
            if (query('div.plyr__poster').length === 0) {
                setTimeout(arguments.callee, 144);
                return;
            }
            window.parent.postMessage(JSON.stringify({
                event: 'ready',
                value: {src: window.location.href}
            }), '*');
        }
    }, 1440);

    document.addEventListener('DOMContentLoaded', function() {
        const additional_styles_arr = [];
        if (window.location.href.indexOf('heatmap=0') !== -1) {
            additional_styles_arr.push('body:not(.x_fullscreen) .plyr__controls .plyr__progress__container div:not(.plyr__progress){display: none;}');
        }
        const additional_styles = document.createElement('style');
        additional_styles.innerText = additional_styles_arr.join("\n");
        document.head.appendChild(additional_styles);
    });
</script>

            var height = hlsLevelInfo.height;

            if (height > width) {
                // vertical video
                var temp = width;
                width = height;
                height = temp;
                isVertical = true;
            }

            switch (height) {
				case 2160:
				case 1440:
                case 1080:
                case 720:
                case 480:
                case 360:
                case 240:
                    return height;
            }

            switch (width) {
				case 3840:

                case 1280:
                    return 720;
                case 852:
                case 854:
                case 856:
                    return 480;
                case 640:
                    return 360;
                case 426:
                case 428:
                    return 240;
            }

            var url = hlsLevelInfo.url[0];
            var splitted = url.split('/');
            var resolution = splitted[splitted.length - 2];

            if (resolution.indexOf('p') > -1) {
				var match = resolution.match(/\d+p/g);
				if (match && match.length > 0) {
					return +match[0].replace('p', '');
				}
            }

            if (resolution.indexOf('x') > -1) {
                splitted = resolution.split('x');
                if (isVertical) {
                    return +splitted[0];
                }

                return +splitted[1];
            }

            return 0;

      						});
      						

                        
      						setTimeout(function () {
                            player.captions.active = true;
                            player.toggleCaptions(true);
      						}, 100);
                        
      					});
      					hls.on(Hls.Events.LEVEL_SWITCHED, function (event, data) {
      						var span = document.querySelector(".plyr__controls [data-plyr='quality'][value='-1'] span")
      						if (span != null) {
      							if (hls.autoLevelEnabled) {
                                    var level = hls.levels[data.level];
                                    var label = getLabel(level);
                                    level.label = label;
      								span.innerHTML = 'Auto (' + label + 'p)'
      							} else {
      								span.innerHTML = 'Auto'
      							}
      						}
      					});
      					
      					hls.on(Hls.Events.FRAG_LOADED, function (event, data) {
      						if (fragmentsLoaded < 2) {
                            if (fragmentsLoaded == 1) {
      								hls.stopLoad();
      							}

                            fragmentsLoaded++;
                        }
                    });
                    

                    // Non-fatal buffer stall handling
                    var bufferStallTimer = null;
                    var lastStallRecoveryAt = 0;
                    var hasRecoveredFromStall = false;

                    

					var retryCount = 0;
					video.addEventListener('error', function (evt) {
						if (evt && evt.type === 'error') {
							var mediaError = evt.currentTarget.error;
							if (!mediaError) {
								return;
							}
							if (mediaError.code == 3) { // MEDIA_ERR_DECODE
								if (retryCount > 5) {
									return;
								}

								retryCount++;
								console.error("MEDIA_ERR_DECODE");
								var now = self.performance.now();
								if (
									!self.recoverDecodingErrorDate ||
									now - self.recoverDecodingErrorDate > 3000
								) {
									self.recoverDecodingErrorDate = self.performance.now();
									console.warn('trying to recover decode error');
									hls.recoverMediaError();
								} else {
									if (
										!self.recoverSwapAudioCodecDate ||
										now - self.recoverSwapAudioCodecDate > 3000
									) {
										self.recoverSwapAudioCodecDate = self.performance.now();
										console.warn('tryin to swap audio codec if possible and recover again');
										hls.swapAudioCodec();
										hls.recoverMediaError();
									} else {
										console.error('Unable to recover');
										hls.recoverMediaError();
									}
								}
							}
						}
					});

      					hls.on(Hls.Events.ERROR, function (event, data) {
                        if (errorEvents[data.details] == undefined) {
      							errorEvents[data.details] = 0;
      						}

                        

                        // Generic non-fatal stall handling with cooldown
                        if (data.details === "bufferStalledError" && !hasRecoveredFromStall) {
                            try { hls.startLoad(); } catch(e) {}
                            if (bufferStallTimer == null) {
                                bufferStallTimer = setTimeout(function() {
                                    bufferStallTimer = null;
                                    var now = (self && self.performance ? self.performance.now() : Date.now());
                                    if (now - lastStallRecoveryAt < 8000) return;
                                    // If we're still not having future data and not paused, attempt a lightweight recover
                                    if (!video.paused && video.readyState < 3) {
                                        try { hls.recoverMediaError(); lastStallRecoveryAt = now; hasRecoveredFromStall = true; } catch(e) {}
                                    }
                                }, 3000);
                            }
                        }

                        console.error("HLS error occured:", data);
      						errorEvents[data.details] += 1;

      						if (data.fatal) {
                            console.error("HLS fatal error occured:", data);
      							switch (data.type) {
      								case Hls.ErrorTypes.NETWORK_ERROR:
      									// try to recover network error
      									console.log('fatal network error encountered, try to recover');
      									hls.startLoad();
      									break;
      								case Hls.ErrorTypes.MEDIA_ERROR:
      									console.log('fatal media error encountered, try to recover');
      									hls.recoverMediaError();
      									break;
      								default:
      									break;
      							}
      						}
      					});

      					setInterval(function() {
      						var bandwidth = hls.abrController.bwEstimator.getEstimate();
      						if (isNaN(bandwidth)) {
      							bandwidth = 0;
      						}
      						if (!video.paused) {

      							var errorEventsString = "";
      							var keys = Object.keys(errorEvents);
      							for (var i = 0; i < keys.length; i++) {
      								var key = keys[i];
                                var value = errorEvents[key];
      								if (errorEventsString != "") {
      									errorEventsString += ",";
      								}
      								errorEventsString += (key + "=" + value);
                            }

                            loadUrl("https://video-1952.mediadelivery.net/.metrics/add?errorEvents=" + errorEventsString + "&bandwidth=" + bandwidth + "&zoneTier=" + 'premium', function (data) { });
      							errorEvents = {};
                        }
      					}, 15000);

                    hls.attachMedia(video);

                    if (isAirplayEnabled) {
                        var source = document.createElement('source');
                        source.src = urlPlaylistUrl;
                        video.appendChild(source);
                        video.disableRemotePlayback = false;
                    }

      					window.hls = hls;
      				}
      				else {
      				    // hls not supported
      					defaultOptions.quality = {
      						default: 480,
      						options: [240, 320, 480, 720]
      					};

      					player = new Plyr(video, defaultOptions);
      					initPlayer();

                    
      				}
      	            

            function getRoutes(request){
                let routes = new Map();
                var p = new URL(request).pathname.split("/");
                for(var i=1;i<p.length-1;i+=2)
                {
                    routes.set(p[i],p[i+1]);
                }
                return routes;
            }

      			function updateQuality(newQuality) {
                if (newQuality === -1) {
                    window.hls.currentLevel = -1; //Enable AUTO quality if option.value = -1
                } else {
                    for (var level of levelsInternal) {
                        if (level.label === newQuality) {
                            console.log("Found quality match", level);
                            window.hls.currentLevel = hls.levels.indexOf(level);
                            return;
                        }
                    }
                }
      			};
      		});

        var errorElement;
        function showError(message){
            if(!errorElement){
                errorElement = document.createElement("div");
                errorElement.className = "error-message";
                const container = document.getElementById("video-container");
                container.appendChild(errorElement);
            }
            errorElement.innerHTML = message;
        }

        function centerVertically() {
            var container = document.getElementById("body");
            var inner = document.getElementById("video-container");

            var inHeight = inner.offsetHeight;
            var conHeight = container.offsetHeight;

            inner.style.marginTop = ((conHeight - inHeight) / 2) + 'px';
        }
        centerVertically();
      		window.addEventListener("resize", centerVertically);
    </script>
